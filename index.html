<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pharmacy Change Helper</title>
<style>
  :root{
    --bg:#f2f5f7; --card:#ffffff; --ink:#12232e; --muted:#5b7183;
    --line:#e2e8ee; --brand:#0f9d78; --brand-d:#0b7c5f; --accent:#0d6efd;
    --usd:#1f8a4c; --lbp:#b3541e; --warn:#c62828; --good:#0f9d78;
    --chip:#eef3f6; --shadow:0 1px 3px rgba(16,40,60,.08),0 6px 20px rgba(16,40,60,.06);
    --r:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e161c; --card:#16232d; --ink:#e8eef2; --muted:#93a6b3;
      --line:#243642; --chip:#1d2e39; --shadow:0 1px 3px rgba(0,0,0,.4);
      --usd:#4cd07d; --lbp:#e8935a;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Kufi Arabic",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-text-size-adjust:100%;
    padding:0 0 40px;
  }
  .wrap{max-width:560px; margin:0 auto; padding:0 14px}
  header{
    position:sticky; top:0; z-index:5;
    background:var(--brand); color:#fff;
    padding:12px 14px; box-shadow:var(--shadow);
  }
  .hbar{max-width:560px; margin:0 auto; display:flex; align-items:center; gap:10px}
  .hbar h1{font-size:18px; margin:0; font-weight:700; flex:1; line-height:1.2}
  .langbtn{
    background:rgba(255,255,255,.18); color:#fff; border:0; border-radius:20px;
    padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer;
  }
  .langbtn:active{transform:scale(.96)}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:16px; margin-top:14px; box-shadow:var(--shadow);
  }
  .lbl{font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin:0 0 10px}
  .rate-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .rate-row .lbl{margin:0}
  input[type=text]{
    font-size:20px; font-weight:600; color:var(--ink);
    background:var(--bg); border:2px solid var(--line); border-radius:12px;
    padding:12px 14px; width:100%; outline:none; text-align:inherit;
  }
  input[type=text]:focus{border-color:var(--brand)}
  .rate-input{max-width:150px; font-size:18px; padding:9px 12px}
  .rate-unit{font-size:13px; color:var(--muted); font-weight:600}
  .amount-line{display:flex; gap:10px; align-items:stretch}
  .amount-line input{flex:1}
  .toggle{display:flex; background:var(--chip); border-radius:12px; padding:4px; gap:4px}
  .toggle button{
    border:0; background:transparent; color:var(--muted); font-weight:700;
    font-size:16px; padding:10px 16px; border-radius:9px; cursor:pointer; min-width:64px;
  }
  .toggle button.on{background:var(--card); color:var(--ink); box-shadow:var(--shadow)}
  .pay-block{margin-top:6px}
  .pay-head{display:flex; align-items:center; gap:8px; margin:14px 0 8px; font-weight:700; font-size:15px}
  .pay-head .cur-usd{color:var(--usd)} .pay-head .cur-lbp{color:var(--lbp)}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:8px}
  .chip{
    background:var(--chip); border:1px solid var(--line); color:var(--ink);
    border-radius:20px; padding:8px 12px; font-size:14px; font-weight:700; cursor:pointer;
  }
  .chip:active{transform:scale(.95)}
  .chip.clear{color:var(--muted); font-weight:600}
  .result{margin-top:14px}
  .big-num{font-size:34px; font-weight:800; line-height:1.1; letter-spacing:-.5px}
  .sub{font-size:15px; color:var(--muted); margin-top:2px}
  .banner{border-radius:12px; padding:14px 16px; margin-bottom:12px}
  .banner.change{background:rgba(15,157,120,.12); border:1px solid rgba(15,157,120,.35)}
  .banner.owe{background:rgba(198,40,40,.10); border:1px solid rgba(198,40,40,.35)}
  .banner.exact{background:var(--chip); border:1px solid var(--line)}
  .banner .big-num.change{color:var(--good)} .banner .big-num.owe{color:var(--warn)}
  .opt{border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:10px; background:var(--bg)}
  .opt-title{font-size:12px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--muted)}
  .opt-main{font-size:20px; font-weight:800; margin-top:4px}
  .opt-note{font-size:13px; margin-top:5px; color:var(--muted)}
  .opt-note.back{color:var(--lbp); font-weight:700}
  .opt-note.short{color:var(--warn); font-weight:700}
  .opt-note.ok{color:var(--good); font-weight:700}
  .opt-bills{font-size:12.5px; color:var(--muted); margin-top:6px}
  .settle{margin-top:6px}
  .settle .two{display:flex; gap:10px}
  .settle .two > div{flex:1}
  .settle-out{font-size:22px; font-weight:800; margin-top:10px}
  .settle-out.back{color:var(--lbp)} .settle-out.short{color:var(--warn)} .settle-out.ok{color:var(--good)}
  .reset{
    width:100%; margin-top:16px; background:var(--card); color:var(--ink);
    border:2px solid var(--line); border-radius:14px; padding:14px; font-size:16px;
    font-weight:800; cursor:pointer;
  }
  .reset:active{transform:scale(.99)}
  .hint{font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.5}
  .foot{text-align:center; color:var(--muted); font-size:12px; margin-top:22px}
  [dir=rtl] .rate-unit,[dir=rtl] .sub{direction:rtl}
  .hidden{display:none}
</style>

<header>
  <div class="hbar">
    <h1 id="title">Pharmacy Change Helper</h1>
    <button class="langbtn" id="langBtn">عربي</button>
  </div>
</header>

<div class="wrap">

  <!-- RATE -->
  <div class="card">
    <div class="rate-row">
      <span class="lbl" id="rateLbl">Exchange rate</span>
      <input type="text" inputmode="decimal" class="rate-input" id="rate" value="89,500">
      <span class="rate-unit" id="rateUnit">LBP = $1</span>
    </div>
  </div>

  <!-- BILL -->
  <div class="card">
    <div class="lbl" id="billLbl">Bill total</div>
    <div class="amount-line">
      <input type="text" inputmode="decimal" id="bill" placeholder="0">
      <div class="toggle" id="billCur">
        <button data-cur="USD" class="on">$</button>
        <button data-cur="LBP">LBP</button>
      </div>
    </div>
    <div class="sub" id="billConv"></div>
  </div>

  <!-- PAYMENT -->
  <div class="card">
    <div class="lbl" id="payLbl">Customer paid</div>

    <div class="pay-block">
      <div class="pay-head"><span class="cur-usd">$</span><span id="payUsdLbl">Dollars</span></div>
      <input type="text" inputmode="decimal" id="payUsd" placeholder="0">
      <div class="chips" id="usdChips"></div>
    </div>

    <div class="pay-block">
      <div class="pay-head"><span class="cur-lbp">LBP</span><span id="payLbpLbl">Lebanese pounds</span></div>
      <input type="text" inputmode="decimal" id="payLbp" placeholder="0">
      <div class="chips" id="lbpChips"></div>
    </div>
    <div class="sub" id="paidConv"></div>
  </div>

  <!-- RESULT -->
  <div class="card result" id="resultCard">
    <div class="lbl" id="resLbl">Change</div>
    <div id="resultBody"></div>
  </div>

  <!-- SETTLE (actual given) -->
  <div class="card" id="settleCard">
    <div class="lbl" id="settleLbl">What are you actually giving back?</div>
    <div class="hint" id="settleHint"></div>
    <div class="settle">
      <div class="two">
        <div>
          <div class="pay-head"><span class="cur-usd">$</span><span id="giveUsdLbl">Dollars</span></div>
          <input type="text" inputmode="decimal" id="giveUsd" placeholder="0">
        </div>
        <div>
          <div class="pay-head"><span class="cur-lbp">LBP</span><span id="giveLbpLbl">Pounds</span></div>
          <input type="text" inputmode="decimal" id="giveLbp" placeholder="0">
        </div>
      </div>
      <div class="settle-out" id="settleOut"></div>
    </div>
  </div>

  <button class="reset" id="resetBtn">New customer</button>
  <div class="foot" id="foot"></div>
</div>

<script>
"use strict";
/* ---------- translations ---------- */
const T = {
  en:{
    dir:"ltr", langBtn:"عربي",
    title:"Pharmacy Change Helper",
    rateLbl:"Exchange rate", rateUnit:"LBP = $1",
    billLbl:"Bill total", payLbl:"Customer paid",
    payUsdLbl:"Dollars", payLbpLbl:"Lebanese pounds",
    resLbl:"Change", settleLbl:"What are you actually giving back?",
    settleHint:"If you don't have exact change, type what you actually hand over. The app tells you the difference.",
    giveUsdLbl:"Dollars", giveLbpLbl:"Pounds",
    resetBtn:"New customer",
    foot:"Works offline · nothing is sent anywhere",
    enterBill:"Enter the bill to start.",
    exact:"Exact — no change", changeDue:"Change to give the customer",
    ownes:"Customer still owes", short:"Not enough — customer must pay more",
    equals:"=", optAllLbp:"All in pounds", optAllUsd:"All in dollars", optMixed:"Mixed (dollars + pounds)",
    give:"Give", plusOwe:"then customer owes you back", plusYouOwe:"you still owe",
    approxOk:"Exactly right", bills:"Bills:", none:"—",
    youGaveExtra:"Customer must return", youStillOwe:"You still owe customer", settled:"Settled — nothing left",
    convBill:"= ", noChangeYet:"Waiting for payment…",
  },
  ar:{
    dir:"rtl", langBtn:"EN",
    title:"حاسبة الصرف للصيدلية",
    rateLbl:"سعر الصرف", rateUnit:"ل.ل = 1$",
    billLbl:"قيمة الفاتورة", payLbl:"دفع الزبون",
    payUsdLbl:"دولار", payLbpLbl:"ليرة لبنانية",
    resLbl:"الباقي", settleLbl:"شو رح تعطي فعلياً؟",
    settleHint:"إذا ما عندك فراطة تمام، اكتب شو رح تعطي فعلياً والتطبيق بيقلّك الفرق.",
    giveUsdLbl:"دولار", giveLbpLbl:"ليرة",
    resetBtn:"زبون جديد",
    foot:"يعمل بدون إنترنت · لا تُرسَل أي بيانات",
    enterBill:"أدخل قيمة الفاتورة للبدء.",
    exact:"تمام — ما في باقي", changeDue:"الباقي للزبون",
    ownes:"باقي على الزبون", short:"غير كافٍ — لازم الزبون يدفع أكثر",
    equals:"=", optAllLbp:"كامل بالليرة", optAllUsd:"كامل بالدولار", optMixed:"مختلط (دولار + ليرة)",
    give:"أعطِ", plusOwe:"وبعدها الزبون يرجّعلك", plusYouOwe:"بعدك مدين له بـ",
    approxOk:"بالضبط", bills:"الأوراق:", none:"—",
    youGaveExtra:"لازم الزبون يرجّع", youStillOwe:"بعدك مدين للزبون بـ", settled:"تمّت التسوية",
    convBill:"= ", noChangeYet:"بانتظار الدفع…",
  }
};

/* ---------- denominations ---------- */
const USD_BILLS=[100,50,20,10,5,1];
const LBP_BILLS=[100000,50000,20000,10000,5000,1000];
const USD_CHIPS=[100,50,20,10,5,1];
const LBP_CHIPS=[100000,50000,20000,10000,5000,1000];
const LBP_STEP=5000;

/* ---------- state ---------- */
let lang = localStorage.getItem("pch_lang") || "en";
let billCur = "USD";

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const num=s=>{ if(!s) return 0; const n=parseFloat(String(s).replace(/[^0-9.]/g,"")); return isFinite(n)?n:0; };
const fmtLbp=n=>Math.round(n).toLocaleString("en-US");
const fmtUsd=n=>{ const r=Math.round(n*100)/100; return (r%1===0)? r.toLocaleString("en-US") : r.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); };
const usdStr=n=>"$"+fmtUsd(n);
const lbpStr=n=>fmtLbp(n)+" "+(lang==="ar"?"ل.ل":"LBP");
function rate(){ const r=num($("rate").value); return r>0? r : 89500; }
function roundTo(n,step){ return Math.round(n/step)*step; }

function billsBreakdown(amount, bills, sym){
  sym=sym||"";
  let rem=Math.round(amount), out=[];
  for(const b of bills){ const c=Math.floor(rem/b); if(c>0){ out.push(c+"×"+sym+b.toLocaleString("en-US")); rem-=c*b; } }
  return out;
}

/* ---------- language ---------- */
function applyLang(){
  const t=T[lang];
  document.documentElement.setAttribute("dir",t.dir);
  document.documentElement.setAttribute("lang",lang);
  $("langBtn").textContent=t.langBtn;
  ["title","rateLbl","rateUnit","billLbl","payLbl","payUsdLbl","payLbpLbl",
   "resLbl","settleLbl","settleHint","giveUsdLbl","giveLbpLbl","resetBtn","foot"]
   .forEach(k=>{ if($(k)) $(k).textContent=t[k]; });
  buildChips();
  compute();
}

/* ---------- chips ---------- */
function buildChips(){
  const usdC=$("usdChips"), lbpC=$("lbpChips");
  usdC.innerHTML=""; lbpC.innerHTML="";
  USD_CHIPS.forEach(v=>{
    const b=document.createElement("button"); b.className="chip"; b.textContent="+$"+v;
    b.onclick=()=>{ $("payUsd").value=fmtUsd(num($("payUsd").value)+v); compute(); };
    usdC.appendChild(b);
  });
  LBP_CHIPS.forEach(v=>{
    const b=document.createElement("button"); b.className="chip"; b.textContent="+"+v.toLocaleString("en-US");
    b.onclick=()=>{ $("payLbp").value=fmtLbp(num($("payLbp").value)+v); compute(); };
    lbpC.appendChild(b);
  });
  const c1=document.createElement("button"); c1.className="chip clear"; c1.textContent=lang==="ar"?"مسح":"clear";
  c1.onclick=()=>{ $("payUsd").value=""; compute(); }; usdC.appendChild(c1);
  const c2=document.createElement("button"); c2.className="chip clear"; c2.textContent=lang==="ar"?"مسح":"clear";
  c2.onclick=()=>{ $("payLbp").value=""; compute(); }; lbpC.appendChild(c2);
}

/* ---------- main compute ---------- */
function compute(){
  const t=T[lang], R=rate();
  const billVal=num($("bill").value);
  const billUSD = billCur==="USD"? billVal : billVal/R;

  // live conversions
  $("billConv").textContent = billVal>0
    ? (billCur==="USD"? (t.convBill+lbpStr(billVal*R)) : (t.convBill+usdStr(billVal/R)))
    : "";

  const payUsd=num($("payUsd").value), payLbp=num($("payLbp").value);
  const paidUSD = payUsd + payLbp/R;
  $("paidConv").textContent = (payUsd>0||payLbp>0) ? (t.convBill+usdStr(paidUSD)+"  ·  "+lbpStr(paidUSD*R)) : "";

  const body=$("resultBody");

  if(billVal<=0){ body.innerHTML='<div class="sub">'+t.enterBill+'</div>'; $("settleCard").classList.add("hidden"); return; }
  if(paidUSD<=0){ body.innerHTML='<div class="sub">'+t.noChangeYet+'</div>'; $("settleCard").classList.add("hidden"); return; }

  const diffUSD = paidUSD - billUSD;        // + => change to customer
  const diffLBP = diffUSD*R;
  const eps=0.01;

  if(Math.abs(diffUSD)<eps){
    body.innerHTML='<div class="banner exact"><div class="big-num">'+t.exact+'</div></div>';
    $("settleCard").classList.add("hidden"); return;
  }
  if(diffUSD < -eps){
    const owe=-diffUSD;
    body.innerHTML=
      '<div class="banner owe"><div class="sub">'+t.short+'</div>'+
      '<div class="big-num owe">'+usdStr(owe)+'</div>'+
      '<div class="sub">'+t.equals+' '+lbpStr(owe*R)+'</div></div>';
    $("settleCard").classList.add("hidden"); return;
  }

  /* change is due */
  let html=
    '<div class="banner change"><div class="sub">'+t.changeDue+'</div>'+
    '<div class="big-num change">'+usdStr(diffUSD)+'</div>'+
    '<div class="sub">'+t.equals+' '+lbpStr(diffLBP)+'</div></div>';

  html+= optAllLbp(diffUSD,R);
  html+= optMixed(diffUSD,R);
  html+= optAllUsd(diffUSD,R);

  body.innerHTML=html;

  // settle-up default suggestion (mixed given), user can edit
  $("settleCard").classList.remove("hidden");
  computeSettle(diffUSD,R);
}

/* leftover note: givenUSD vs owed diffUSD (both in USD) */
function leftoverNote(owedUSD, givenUSD, R){
  const t=T[lang], d=owedUSD-givenUSD; // + => still owe more; - => customer owes back
  if(Math.abs(d)<0.01) return '<div class="opt-note ok">✓ '+t.approxOk+'</div>';
  if(d>0) return '<div class="opt-note short">'+t.plusYouOwe+' '+lbpStr(d*R)+'</div>';
  return '<div class="opt-note back">'+t.plusOwe+' '+lbpStr(-d*R)+'</div>';
}

function optAllLbp(diffUSD,R){
  const t=T[lang];
  const raw=diffUSD*R, giveLbp=roundTo(raw,LBP_STEP);
  const givenUSD=giveLbp/R;
  return '<div class="opt"><div class="opt-title">'+t.optAllLbp+'</div>'+
    '<div class="opt-main">'+t.give+' '+lbpStr(giveLbp)+'</div>'+
    leftoverNote(diffUSD,givenUSD,R)+
    '<div class="opt-bills">'+t.bills+' '+(billsBreakdown(giveLbp,LBP_BILLS).join(" + ")||t.none)+'</div></div>';
}

function optAllUsd(diffUSD,R){
  const t=T[lang];
  const giveUsd=Math.round(diffUSD); // nearest whole dollar
  return '<div class="opt"><div class="opt-title">'+t.optAllUsd+'</div>'+
    '<div class="opt-main">'+t.give+' '+usdStr(giveUsd)+'</div>'+
    leftoverNote(diffUSD,giveUsd,R)+
    '<div class="opt-bills">'+t.bills+' '+(billsBreakdown(giveUsd,USD_BILLS,"$").join(" + ")||t.none)+'</div></div>';
}

function optMixed(diffUSD,R){
  const t=T[lang];
  const whole=Math.floor(diffUSD);
  const fracUSD=diffUSD-whole;
  let lbpPart=roundTo(fracUSD*R,LBP_STEP);
  const givenUSD=whole + lbpPart/R;
  const parts=[];
  if(whole>0) parts.push(usdStr(whole));
  if(lbpPart>0) parts.push(lbpStr(lbpPart));
  const mainTxt = parts.length? t.give+' '+parts.join(" + ") : t.give+' '+lbpStr(0);
  let bills="";
  if(whole>0) bills+=' '+billsBreakdown(whole,USD_BILLS,"$").join(" + ");
  if(lbpPart>0) bills+=(whole>0?"  ·  ":" ")+billsBreakdown(lbpPart,LBP_BILLS).join(" + ");
  return '<div class="opt"><div class="opt-title">'+t.optMixed+'</div>'+
    '<div class="opt-main">'+mainTxt+'</div>'+
    leftoverNote(diffUSD,givenUSD,R)+
    (bills.trim()? '<div class="opt-bills">'+t.bills+bills+'</div>':'')+'</div>';
}

/* ---------- settle-up (owe-back scenario) ---------- */
function computeSettle(owedUSD,R){
  const t=T[lang];
  const gUsd=num($("giveUsd").value), gLbp=num($("giveLbp").value);
  const out=$("settleOut");
  if(gUsd<=0 && gLbp<=0){ out.textContent=""; return; }
  const givenUSD=gUsd + gLbp/R;
  const d=givenUSD-owedUSD; // + => you gave extra, customer returns; - => you still owe
  if(Math.abs(d)<0.01){ out.className="settle-out ok"; out.textContent="✓ "+t.settled; return; }
  if(d>0){ out.className="settle-out back"; out.textContent=t.youGaveExtra+": "+usdStr(d)+"  ("+lbpStr(d*R)+")"; }
  else { out.className="settle-out short"; out.textContent=t.youStillOwe+": "+usdStr(-d)+"  ("+lbpStr(-d*R)+")"; }
}

/* ---------- wiring ---------- */
function recompute(){ compute(); }
["rate","bill","payUsd","payLbp"].forEach(id=>$(id).addEventListener("input",recompute));
["giveUsd","giveLbp"].forEach(id=>$(id).addEventListener("input",()=>{
  const R=rate(); const billVal=num($("bill").value);
  const billUSD=billCur==="USD"?billVal:billVal/R;
  const paidUSD=num($("payUsd").value)+num($("payLbp").value)/R;
  computeSettle(paidUSD-billUSD, R);
}));

$("billCur").addEventListener("click",e=>{
  const b=e.target.closest("button[data-cur]"); if(!b) return;
  billCur=b.dataset.cur;
  [...$("billCur").children].forEach(x=>x.classList.toggle("on",x===b));
  compute();
});

$("langBtn").addEventListener("click",()=>{
  lang = lang==="en"?"ar":"en";
  localStorage.setItem("pch_lang",lang);
  applyLang();
});

$("rate").addEventListener("change",()=>localStorage.setItem("pch_rate",num($("rate").value)));

$("resetBtn").addEventListener("click",()=>{
  ["bill","payUsd","payLbp","giveUsd","giveLbp"].forEach(id=>$(id).value="");
  compute();
  window.scrollTo({top:0,behavior:"smooth"});
});

/* init */
(function init(){
  const savedRate=localStorage.getItem("pch_rate");
  if(savedRate && num(savedRate)>0) $("rate").value=fmtLbp(num(savedRate));
  applyLang();
})();
</script>
